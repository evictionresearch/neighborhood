url: ~
template:
  bootstrap: 5

reference:
  - title: Neighborhood typologies
    desc: Build and summarize tract-level racial/ethnic typologies.
    contents:
      - ntdf
      - ntcheck
      - nt_pal
  - title: Affordability index
    desc: Tract-level housing affordability relative to area median income.
    contents:
      - afford_index
      - afford_bands
      - afford_verdict
      - afford_capacity
      - afford_map
      - afford_caption
      - afford_entry
      - afford_zori
      - afford_stability
      - inflow_index
      - ami_cutoffs
      - hud_ami
      - afford
  - title: Mapping (MapLibre)
    desc: >
      Build interactive MapLibre GL maps of neighborhood data — choropleths,
      legends, labels, popups, and PMTiles. Built on Kyle Walker's mapgl.
    contents:
      - nt_map
      - nt_map_sync
      - nt_declutter_basemap
      - nt_maplibre
      - nt_add_choropleth
      - nt_add_labels
      - nt_layers_control
      - nt_popup
      - nt_pmtiles
  - title: Charts (interactive)
    desc: >
      Interactive editorial charts in the ERN "newspaper graphic" style where
      hovering reveals the y-axis. Built on John Coene's echarts4r. From trend
      lines and sparklines to ranked bars, disparity dumbbells, lollipops,
      composition bars, slope charts, scatter, and Du Bois-style waffle units.
    contents:
      - nt_chart
      - nt_spark
      - nt_bar
      - nt_lollipop
      - nt_dumbbell
      - nt_range
      - nt_stacked_bar
      - nt_slope
      - nt_scatter
      - nt_waffle
  - title: Static charts (ggplot2)
    desc: >
      A ggplot2 theme and color scales in the same ERN look, for reproducing the
      static (print/PDF) report and paper figures. ern_swatch() opens the titled
      sheet of every palette with WCAG contrast receipts.
    contents:
      - theme_ern
      - scale_ern
      - ern_palette
      - ern_swatch
  - title: Crosswalks
    contents:
      - get_co_puma
      - nt_areal_weight
      - nt_zcta_weights
  - title: Datasets
    contents:
      - us_nt_tracts2024
      - mn_evictions

articles:
  - title: Articles
    navbar: ~
    contents:
      - mapping-with-maplibre
      - interactive-charts
      - chart-gallery
      - ern-palettes
      - precarity-mapping
      - neighborhood-typologies
      - affordability-index
